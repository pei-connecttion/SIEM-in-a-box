# ============================================
# INPUT 
# ============================================
input {
  kafka {
    bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS}"
    topics => ["logs-nginx-default"]
    group_id => "logstash-consumer-group"
    codec => "json"
    consumer_threads => 1
    decorate_events => true
    auto_offset_reset => "earliest"
  }
}

# ============================================
# FILTER
# ============================================
filter {
  if [message] {
    grok {
      match => {
        "message" => [
          "%{IPORHOST:nginx.access.remote_ip} - %{DATA:nginx.access.user_name} \[%{HTTPDATE:nginx.access.time}\] \"%{WORD:nginx.access.method} %{DATA:nginx.access.url} HTTP/%{NUMBER:nginx.access.http_version}\" %{NUMBER:nginx.access.response_code} %{NUMBER:nginx.access.body_sent.bytes} \"%{DATA:nginx.access.referrer}\" \"%{DATA:nginx.access.agent}\"",

          "%{DATA:nginx.error.time} \[%{DATA:nginx.error.level}\] %{NUMBER:nginx.error.pid}#%{NUMBER:nginx.error.tid}: %{GREEDYDATA:nginx.error.message}"
        ]
      }
      tag_on_failure => ["_nginx_grok_failure"]
    }

    if [nginx.access.time] {
      date {
        match => [ "nginx.access.time", "dd/MMM/yyyy:HH:mm:ss Z" ]
        target => "@timestamp"
      }
    }

    if [nginx.access.agent] {
      useragent {
        source => "nginx.access.agent"
        target => "user_agent"
      }
    }

    if [nginx.access.response_code] {
      mutate {
        convert => {
          "nginx.access.response_code" => "integer"
          "nginx.access.body_sent.bytes" => "integer"
        }
      }
    }

    if [nginx.access.remote_ip] {
      mutate {
        rename => {
          "nginx.access.remote_ip" => "source.ip"
          "nginx.access.url" => "url.original"
          "nginx.access.method" => "http.request.method"
          "nginx.access.response_code" => "http.response.status_code"
          "nginx.access.body_sent.bytes" => "http.response.body.bytes"
          "nginx.access.referrer" => "http.request.referrer"
          "nginx.access.agent" => "user_agent.original"
        }
      }
    }

    # Classify response codes
    if [http.response.status_code] {
      if [http.response.status_code] >= 500 {
        mutate { add_field => { "log.level" => "error" } }
      } else if [http.response.status_code] >= 400 {
        mutate { add_field => { "log.level" => "warn" } }
      } else {
        mutate { add_field => { "log.level" => "info" } }
      }
    }
  }

  mutate {
    add_field => {
      "event.kind" => "event"
      "event.category" => "web"
      "event.type" => "access"
      "event.dataset" => "nginx.access"
    }
  }
}

# ============================================
# OUTPUT
# ============================================
output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST}"]
    user => "${ELASTICSEARCH_USERNAME}"
    password => "${ELASTICSEARCH_PASSWORD}"
    ssl => true
    cacert => "/certs/ca/ca.crt"

    index => "logs-nginx-default"

    action => "create"

    manage_template => true
    template_name => "logs-nginx-default"
  }

  # stdout { codec => rubydebug }
}
